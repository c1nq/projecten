networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  pihole_data:
  pihole_dnsmasq:

services:

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    network_mode: host
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    network_mode: host
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - /home/semenkelmans/files/ssl:/etc/grafana/ssl:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=rpi_monitor_2024
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_BASIC_ENABLED=true
      - GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION=false
      - GF_FEATURE_TOGGLES_ENABLE=twoFactorAuthentication
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel
      - GF_SERVER_PROTOCOL=https
      - GF_SERVER_CERT_FILE=/etc/grafana/ssl/rpi-monitor.crt
      - GF_SERVER_CERT_KEY=/etc/grafana/ssl/rpi-monitor.key
    depends_on: [prometheus]

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    network_mode: host
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    network_mode: host
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /var/lib/node_exporter/textfile_collector:/textfile_collector:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.textfile.directory=/textfile_collector'

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    restart: unless-stopped
    network_mode: host
    ports:
      - "9115:9115"
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro

  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    network_mode: host
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:80"
    volumes:
      - pihole_data:/etc/pihole
      - pihole_dnsmasq:/etc/dnsmasq.d
    environment:
      - TZ=Europe/Amsterdam
      - WEBPASSWORD=your-password-here
      - PIHOLE_DNS_=8.8.8.8;8.8.4.4
      - DNSMASQ_LISTENING=all
    cap_add:
      - NET_ADMIN

  pihole-exporter:
    image: ekofr/pihole-exporter:latest
    container_name: pihole-exporter
    restart: unless-stopped
    network_mode: host
    ports:
      - "9617:9617"
    environment:
      - PIHOLE_HOSTNAME=pihole
      - PIHOLE_PASSWORD=your-password-here
      - INTERVAL=30s
      - PORT=9617
    depends_on: [pihole]

  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    container_name: speedtest-tracker
    restart: unless-stopped
    network_mode: host
    ports:
      - "8765:80"
    volumes:
      - ./speedtest:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
      - APP_KEY=base64:2o1WbNre/r3TqNNPBKSfxIBzqRKqFqBLDOsNW+UY1Oc=
      - DB_CONNECTION=sqlite
      - SPEEDTEST_SCHEDULE="0 */3 * * *"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --schedule "0 0 4 * * *" --cleanup
    networks: [monitoring]
